title: "My Personal Blog"
description: "Thoughts, tutorials, and daily notes"
baseurl: "" # the subpath of your site, e.g. "/blog" if hosted at username.github.io/blog
url: "https://divyansh-u5.github.io" # your GitHub Pages URL (update if different)
author: "Divyansh"

# Build settings
theme: minima
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Pagination settings
paginate: 5
paginate_path: "/page:num/"

# Exclude these files from production build
exclude:
  - "README.md"
  - "Gemfile"
  - "Gemfile.lock" 